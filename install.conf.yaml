- defaults:
    link:
      relink: true
      force: true

- clean: ['~']

- create:
  - ~/Projects
  - ~/Projects/work
  - ~/Projects/personal
  - ~/.tmux/plugins
  - ~/.claude

- link:
  #  ~/.vimrc: vimrc
    ~/.aliases: aliases
    ~/.config/nvim: config/nvim
    ~/.gitconfig: gitconfig
    ~/.gitignore_global: gitignore_global
    ~/.p10k.zsh: p10k.zsh
    ~/.tmux.conf: tmux.conf
    ~/.tmux/plugins/tpm: tpm
    ~/.zshrc: zshrcnew
    ~/.claude/settings.json: claude/settings.json
    ~/.local/bin/alacritty-theme: bin/alacritty-theme
